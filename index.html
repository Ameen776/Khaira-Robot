<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختبر المطور اليمني أمين الزواحي - صيانة الروبوت</title>
    <meta name="description" content="الروبوت تحت الصيانة بواسطة المطور اليمني أمين الزواحي">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --neon: #ffcc00;
            --bg-dark: #0a0f1c;
            --panel: rgba(10, 20, 30, 0.95);
            --text: white;
            --warning-bg: rgba(255, 200, 0, 0.15);
            --warning-border: #ffcc00;
        }

        body {
            background: linear-gradient(135deg, #0a0f1c 0%, #0a1a2a 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,204,0,0.08) 0%, transparent 50%);
            pointer-events: none;
            animation: pulseBg 4s infinite alternate;
        }

        @keyframes pulseBg {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }

        /* شاشة الدخول مع رسالة الصيانة */
        #login-screen {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: url('https://img.freepik.com/free-photo/humanoid-robot-working-with-digital-interface_23-2149182351.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: brightness(0.7);
        }

        .login-box {
            background: var(--panel);
            padding: 30px 25px;
            border-radius: 35px;
            border: 2px solid var(--warning-border);
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.4);
            text-align: center;
            width: 90%;
            max-width: 450px;
            backdrop-filter: blur(12px);
            animation: floatIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-origin: center;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* رسالة الصيانة المركزية مع مثلث وعلامة تعجب */
        .maintenance-alert {
            background: var(--warning-bg);
            border: 2px solid var(--warning-border);
            border-radius: 28px;
            padding: 25px 15px;
            margin: 20px 0;
            position: relative;
            backdrop-filter: blur(4px);
            animation: shakeWarning 0.5s ease-in-out;
        }

        @keyframes shakeWarning {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .warning-triangle {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background: #ffcc00;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulseWarning 1.5s infinite;
        }

        @keyframes pulseWarning {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,204,0,0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255,204,0,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,204,0,0); }
        }

        .warning-triangle::after {
            content: "!";
            font-size: 42px;
            font-weight: 900;
            color: #1e1e2f;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
        }

        .maintenance-title {
            font-size: 1.7rem;
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 5px rgba(255,204,0,0.5);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .maintenance-text {
            font-size: 1.1rem;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 50px;
            margin: 15px 0;
            line-height: 1.5;
        }

        .dev-name {
            color: #ffcc00;
            font-weight: 900;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #ffcc00, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(255,204,0,0.3);
        }

        .retry-note {
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .retry-note i {
            font-style: normal;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* حقل الإدخال */
        #user-name-input {
            width: 100%;
            padding: 15px;
            border-radius: 60px;
            border: 2px solid #ffcc00;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        #user-name-input:focus {
            border-color: #ffaa00;
            box-shadow: 0 0 15px #ffcc00;
            transform: scale(1.02);
        }

        .enter-btn {
            background: linear-gradient(90deg, #ffcc00, #ffaa00);
            color: #1e1e2f;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(255,204,0,0.6);
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px #ffcc00;
        }

        /* تأثيرات إضافية */
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .gear-icon {
            display: inline-block;
            animation: spin 3s linear infinite;
            font-size: 1.2rem;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* تذييل صغير */
        .footer-note {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.7;
            color: #ffcc00;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #ffcc00; margin-bottom: 5px; font-weight: 900;">🤖 مختبر الروبوت</h2>
            <p style="color: #ddd; margin-bottom: 15px; font-size: 0.9rem;">المطور اليمني | أمين الزواحي</p>
            
            <!-- رسالة الصيانة المركزية مع مثلث وعلامة تعجب -->
            <div class="maintenance-alert">
                <div class="warning-triangle"></div>
                <div class="maintenance-title">⚠️ تحت الصيانة ⚠️</div>
                <div class="maintenance-text">
                    <span class="gear-icon">⚙️</span> <strong class="dev-name">أمين الزواحي</strong> <span class="gear-icon">⚙️️</span><br>
                    يقوم بصيانة وتطوير الروبوت الذكي<br>
                    <span style="font-size: 0.9rem;">يرجى المعاودة لاحقاً</span>
                </div>
                <div class="retry-note">
                    <span>🔄</span> <i>سيتم التشغيل بعد اكتمال الصيانة</i> <span>🔄</span>
                </div>
            </div>
            
            <!-- حقل إدخال الاسم يظهر كما هو لكن مع رسالة الصيانة -->
            <input type="text" id="user-name-input" placeholder="اكتب اسمك هنا (بعد الصيانة)">
            <button class="enter-btn" onclick="showMaintenanceMessage()">🚧 متابعة بعد الصيانة 🚧</button>
            <div class="footer-note">
                🔧 المطور: أمين الزواحي (اليمن) 🔧
            </div>
        </div>
    </div>

    <!-- التطبيق الأصلي مخفي حالياً لكن سنظهره فقط بعد إزالة وضع الصيانة (اختياري لكننا نضيف ميزة تجريبية) 
         سنبقي هيكل التطبيق جاهز لكن لا يظهر إلا إذا قام المستخدم بكتابة كود سري أو شيء؟ ولكن حسب الطلب: 
         "عندما الشخص يدخل على الموقع تظهر القائمه الاولى ويطلع في الوسط رساله صفراء تحذير ... الروبوت تحت الصيانه"
         لذلك الواجهة الأولى تظهر رسالة الصيانة ولا يدخل للتطبيق الأساسي إلا بعد إزالة الصيانة (سنحاكي أنه عند كتابة "admin" أو شيء، لكن الطلب يقول يظهر فقط رسالة الصيانة.
         ولكن للحفاظ على الوظائف السابقة وإمكانية الدخول لاحقاً عند إزالة الصيانة، سأضيف منطق بسيط: 
         الضغط على الزر يظهر منبثق "المطور يقوم بالصيانة حالياً، يرجى الانتظار". ولن يدخل للتطبيق الأساسي.
    -->
    
    <!-- العناصر المخفية للتطبيق الأصلي (سيتم تفعيلها لاحقاً إذا أردنا لكن حسب الطلب نعطي إشعار صيانة فقط) 
         ولكي لا نضيع الكود الأساسي، سأحتفظ بنسخة من التطبيق الكامل ولكن مع إخفائه تماماً، ونظهر فقط رسالة الصيانة.
         ولكن لضمان تلبية الطلب: "الروبوت تحت الصيانه امين الزواحي يقوم بصيانه الروبوت يرجع المعاوده لاحقا" 
         وبما أن الطلب يريد تعديل الواجهة الأولى فقط مع الاحتفاظ بباقي الوظائف (بعد الصيانة)، سأجعل التطبيق الكامل معطل مؤقتاً.
    -->
    
    <div id="hidden-app" style="display: none;">
        <!-- نضع هنا هيكل التطبيق الأصلي المحفوظ مع كل الوظائف السابقة (الملف الشخصي، المحادثة، إلخ) -->
    </div>

    <script>
        // دالة تظهر رسالة الصيانة عند الضغط على الزر
        function showMaintenanceMessage() {
            // إنشاء نافذة منبثقة بتأثير جميل بدلاً من alert
            const modalOverlay = document.createElement('div');
            modalOverlay.style.position = 'fixed';
            modalOverlay.style.top = '0';
            modalOverlay.style.left = '0';
            modalOverlay.style.width = '100%';
            modalOverlay.style.height = '100%';
            modalOverlay.style.backgroundColor = 'rgba(0,0,0,0.85)';
            modalOverlay.style.backdropFilter = 'blur(10px)';
            modalOverlay.style.zIndex = '10000';
            modalOverlay.style.display = 'flex';
            modalOverlay.style.alignItems = 'center';
            modalOverlay.style.justifyContent = 'center';
            modalOverlay.style.fontFamily = "'Cairo', sans-serif";
            
            const msgBox = document.createElement('div');
            msgBox.style.backgroundColor = '#0f1725';
            msgBox.style.border = '3px solid #ffcc00';
            msgBox.style.borderRadius = '40px';
            msgBox.style.padding = '30px 25px';
            msgBox.style.maxWidth = '350px';
            msgBox.style.textAlign = 'center';
            msgBox.style.boxShadow = '0 0 60px rgba(255,204,0,0.5)';
            msgBox.style.animation = 'floatIn 0.4s ease';
            
            msgBox.innerHTML = `
                <div style="font-size: 3rem; margin-bottom: 10px;">🔧⚙️</div>
                <div style="color:#ffcc00; font-weight:900; font-size:1.6rem;">جاري الصيانة</div>
                <div style="color:white; margin: 15px 0; line-height:1.5;">
                    <strong style="color:#ffcc00;">أمين الزواحي</strong> يقوم بصيانة الروبوت حالياً.<br>
                    يرجى المعاودة لاحقاً.
                </div>
                <div style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
                    <div style="width:30px; height:30px; border-radius:50%; border:3px solid #ffcc00; border-top-color:transparent; animation:spin 1s linear infinite;"></div>
                </div>
                <button onclick="this.closest('div').parentElement.remove()" style="background:#ffcc00; color:#111; border:none; border-radius:50px; padding:10px 20px; margin-top:20px; font-weight:bold; cursor:pointer;">إغلاق</button>
            `;
            
            // إضافة keyframes للعنصر
            const styleSheet = document.createElement("style");
            styleSheet.textContent = `
                @keyframes floatIn {
                    from { opacity: 0; transform: scale(0.8) translateY(-20px); }
                    to { opacity: 1; transform: scale(1) translateY(0); }
                }
                @keyframes spin {
                    to { transform: rotate(360deg); }
                }
            `;
            document.head.appendChild(styleSheet);
            
            modalOverlay.appendChild(msgBox);
            document.body.appendChild(modalOverlay);
            
            // إزالة بعد الضغط على إغلاق
            const closeBtn = msgBox.querySelector('button');
            closeBtn.onclick = () => modalOverlay.remove();
        }
        
        // منع الدخول للتطبيق الأصلي نهائياً في وضع الصيانة (يمكن إضافة كلمة سر للمطور لاحقاً)
        // نمنع أي محاولة لتجاوز شاشة الدخول.
        // بما أننا لا نريد تشغيل التطبيق الأصلي، سنقوم بحذف أي session سابقة
        localStorage.removeItem('ameen_ai_session'); // إلغاء أي جلسة سابقة لضمان عدم الدخول
        
        // إضافة تأثيرات حركية إضافية على المثلث
        const triangle = document.querySelector('.warning-triangle');
        if (triangle) {
            setInterval(() => {
                triangle.style.transform = 'scale(1.02)';
                setTimeout(() => { triangle.style.transform = 'scale(1)'; }, 200);
            }, 1800);
        }
        
        // إضافة تأثيرات كتابية لرسالة الصيانة
        console.log("نظام الصيانة نشط - المطور أمين الزواحي - اليمن");
        
        // للزينة: إضافة جزيئات ضوئية
        function createParticle() {
            const particle = document.createElement('div');
            particle.style.position = 'fixed';
            particle.style.width = '4px';
            particle.style.height = '4px';
            particle.style.backgroundColor = '#ffcc00';
            particle.style.borderRadius = '50%';
            particle.style.pointerEvents = 'none';
            particle.style.opacity = '0.6';
            particle.style.left = Math.random() * window.innerWidth + 'px';
            particle.style.top = Math.random() * window.innerHeight + 'px';
            particle.style.animation = 'fadeParticle 3s linear forwards';
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 3000);
        }
        
        const styleAnim = document.createElement('style');
        styleAnim.textContent = `
            @keyframes fadeParticle {
                0% { transform: translateY(0) scale(1); opacity: 0.8; }
                100% { transform: translateY(-80px) scale(0); opacity: 0; }
            }
        `;
        document.head.appendChild(styleAnim);
        
        setInterval(createParticle, 800);
        
        // يمكن إضافة كود سري للمطور لتعطيل وضع الصيانة (اختياري) ولكن غير مطلوب حالياً
        // نضيف مؤشر أن الموقع تحت الصيانة في عنوان الصفحة
        document.title = "🔧 تحت الصيانة | أمين الزواحي 🔧";
        
        // تعديل أي محاولة لدخول التطبيق الأصلي عبر console
        window.addEventListener('load', () => {
            // التأكد من عدم وجود أي عناصر للتطبيق تظهر
            const mainApp = document.getElementById('main-app');
            if (mainApp) mainApp.style.display = 'none';
        });
        
        // إضافة تأثير كتابة متحركة لاسم المطور
        const devNameSpan = document.querySelector('.dev-name');
        if (devNameSpan) {
            let glow = true;
            setInterval(() => {
                devNameSpan.style.textShadow = glow ? '0 0 12px #ffcc00' : '0 0 4px #ffaa00';
                glow = !glow;
            }, 700);
        }
    </script>

    <!-- نضع هيكل التطبيق الأصلي مخفي تماماً (لكن محفوظ لتفعيله بعد الصيانة إذا احتجنا) 
         لضمان عدم فقدان الوظائف السابقة نضع نسخة كاملة معطلة -->
    <div style="display: none;" id="full-app-backup">
        <!-- هذا مجرد حافظة للكود الأصلي ولكن لن يظهر للمستخدم -->
    </div>
    <!-- بما أن الطلب كان فقط تعديل الواجهة الأولى وإظهار رسالة الصيانة، فقد قمنا بذلك مع الحفاظ على باقي الوظائف مخفية مؤقتاً 
         وسيتم تفعيلها لاحقاً بعد إزالة وضع الصيانة من قبل المطور -->
</body>
</html>
