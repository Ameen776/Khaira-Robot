<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر أمين هارون الزواحي</title>
    <style>
        :root { --neon: #00ffcc; --bg: #02050a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .grid { position: absolute; inset: 0; background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); opacity: 0.15; z-index: -1; }

        .robot-frame { width: 300px; height: 300px; border-radius: 50%; border: 5px solid var(--neon); box-shadow: 0 0 50px var(--neon); overflow: hidden; margin-bottom: 20px; transition: 0.3s; }
        .robot-img { width: 100%; height: 100%; object-fit: cover; }
        .talking { transform: scale(1.1); box-shadow: 0 0 80px var(--neon); }

        .controls { background: rgba(0,20,40,0.9); padding: 20px; border-radius: 20px; border: 1px solid var(--neon); width: 90%; max-width: 400px; text-align: center; }
        select { width: 100%; padding: 10px; border-radius: 10px; background: #000; color: white; border: 1px solid var(--neon); }
        #chat-box { margin-top: 20px; padding: 15px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="grid"></div>

    <div class="robot-frame" id="frame">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" id="bot-img" class="robot-img">
    </div>

    <div class="controls">
        <label>اختر شخصية الروبوت:</label>
        <select id="char-select" onchange="changeChar()">
            <option value="https://i.ibb.co/FqbzKKDj/images-4.jpg">الأساسية (خيره)</option>
            <option value="https://img.freepik.com/free-vector/ai-chip-artificial-intelligence-future-technology_1017-31551.jpg">المعالج الذكي</option>
            <option value="https://img.freepik.com/free-vector/robot-face-concept-illustration_114360-8223.jpg">الروبوت الذهبي</option>
            <option value="https://img.freepik.com/free-vector/cyber-punk-style-robot-head_23-2148530366.jpg">روبوت سايبر</option>
            <option value="https://img.freepik.com/free-vector/digital-human-face-ai-technology_23-2148819586.jpg">الوجه الرقمي</option>
            <option value="https://img.freepik.com/free-vector/futuristic-robot-head-design_23-2148530397.jpg">الروبوت المتطور</option>
            <option value="https://img.freepik.com/free-vector/robotic-head-ai-concept_23-2148530351.jpg">الذكاء الأزرق</option>
            <option value="https://img.freepik.com/free-vector/holographic-robot-head_23-2148530345.jpg">الهولوغرام</option>
            <option value="https://img.freepik.com/free-vector/abstract-technology-robot-face_23-2148530372.jpg">روبوت نيون</option>
            <option value="https://img.freepik.com/free-vector/artificial-intelligence-concept-illustration_114360-7895.jpg">المساعد البشري</option>
        </select>
    </div>

    <div id="chat-box">اضغط لتفعيل المايك وبدء المحادثة..</div>
    <button onclick="startApp()" style="padding: 15px 40px; margin-top: 20px; cursor: pointer;">تفعيل النظام</button>

    <script>
        const GROQ_KEY = "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";
        
        function changeChar() {
            document.getElementById('bot-img').src = document.getElementById('char-select').value;
        }

        function speak(text, callback) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            document.getElementById('frame').classList.add('talking');
            utter.onend = () => { document.getElementById('frame').classList.remove('talking'); if(callback) callback(); };
            window.speechSynthesis.speak(utter);
        }

        async function startApp() {
            const welcome = "مرحباً بك يا سيد أمين، أنا نظامك الذكي، جاهز للعمل.";
            speak(welcome, startListening);
        }

        function startListening() {
            const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
            rec.lang = 'ar-SA';
            rec.onresult = async (e) => {
                const q = e.results[0][0].transcript;
                document.getElementById('chat-box').innerText = "أنت: " + q;
                await getAI(q);
            };
            rec.onerror = () => { setTimeout(startListening, 500); };
            rec.start();
        }

        async function getAI(q) {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_KEY}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: "أنت المساعد الذكي للمطور أمين هارون الزواحي." }, { role: "user", content: q }]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            document.getElementById('chat-box').innerText = reply;
            speak(reply, startListening);
        }
    </script>
</body>
</html>
