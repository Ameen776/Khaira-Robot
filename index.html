<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختبر المطور أمين الزواحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #02050a; --panel: rgba(0, 15, 30, 0.95); --text: white; }
        .light-mode { --bg: #f0f2f5; --panel: rgba(255, 255, 255, 0.95); --text: #111; --neon: #0077ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; transition: 0.3s; }

        header { position: fixed; top: 0; left: 0; right: 0; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 2000; display: none; }
        .hamburger { font-size: 2.2rem; color: var(--neon); cursor: pointer; }
        .profile-btn { display: flex; align-items: center; gap: 10px; background: rgba(0,255,204,0.1); padding: 5px 15px; border-radius: 50px; border: 1.5px solid var(--neon); cursor: pointer; }
        .profile-btn img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--neon); }

        #login-screen { position: fixed; inset: 0; z-index: 3000; background: #000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 25px; border: 2px solid var(--neon); text-align: center; width: 85%; max-width: 400px; }
        .main-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--neon); background: #000; color: #fff; text-align: center; margin-bottom: 15px; }

        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--panel); border-right: 2px solid var(--neon); z-index: 2500; padding: 80px 20px; transition: 0.4s; }
        .sidebar.active { left: 0; }
        .side-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: var(--neon); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        main { height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .robot-node { width: 240px; height: 240px; border-radius: 50%; border: 5px solid var(--neon); box-shadow: 0 0 40px var(--neon); overflow: hidden; cursor: pointer; }
        .speaking { animation: pulse 0.4s infinite alternate; border-color: gold; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
        
        #chat-bubble { width: 90%; max-width: 500px; background: var(--panel); padding: 25px; border-radius: 25px; border: 1px solid var(--neon); text-align: center; font-size: 1.1rem; min-height: 100px; }
        footer { position: fixed; bottom: 20px; font-size: 0.8rem; color: var(--neon); text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--neon); margin-bottom: 20px;">مختبر أمين الزواحي</h2>
            <input type="text" id="name-field" class="main-input" placeholder="سجل اسمك يا بطل..">
            <button class="side-btn" onclick="saveUser()">دخول النظام</button>
        </div>
    </div>

    <header id="app-header">
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
        <div class="profile-btn" onclick="location.reload()">
            <span id="nav-name" style="font-weight: bold;">أمين</span>
            <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" id="nav-avatar">
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <button class="side-btn" onclick="document.body.classList.toggle('light-mode')">وضع النهار/الليل</button>
        <button class="side-btn" style="background:#ff4444; color:#fff;" onclick="logout()">تسجيل الخروج</button>
    </div>

    <main id="app-content">
        <div class="robot-node" id="r-node" onclick="startMic()">
            <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" id="main-bot-img" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div id="chat-bubble">بانتظارك..</div>
        <div style="color: var(--neon); font-size: 0.8rem;" id="id-display">ID: 000000000</div>
        <footer>المطور: أمين هارون الزواحي - اليمن 🇾🇪</footer>
    </main>

    <script>
        const API_KEY = "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";
        let state = { name: "", id: "", bot: "https://i.ibb.co/FqbzKKDj/images-4.jpg" };

        window.onload = () => {
            const data = localStorage.getItem('ameen_pro_v8');
            if(data) { state = JSON.parse(data); run(); }
        };

        function saveUser() {
            const n = document.getElementById('name-field').value;
            if(!n) return;
            state.name = n;
            state.id = Math.floor(100000000 + Math.random() * 900000000);
            localStorage.setItem('ameen_pro_v8', JSON.stringify(state));
            run(true);
        }

        function run(isNew = false) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('nav-name').innerText = state.name;
            document.getElementById('id-display').innerText = "ID: " + state.id;

            if(isNew) {
                const welcome = `اهلا بك يا ${state.name}، اهلا بك بذكاء الاصطناعي، انا مبرمج من امين الزواحي ذكاء اصطناعي مبرمج من امين الزواحي، هل يمكنني مساعدتك؟`;
                document.getElementById('chat-bubble').innerText = welcome;
                talk(welcome);
            }
        }

        function talk(t) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(t);
            speech.lang = 'ar-SA';
            speech.rate = 1.0;
            speech.onstart = () => document.getElementById('r-node').classList.add('speaking');
            speech.onend = () => document.getElementById('r-node').classList.remove('speaking');
            window.speechSynthesis.speak(speech);
        }

        async function fetchAI(q) {
            document.getElementById('chat-bubble').innerText = "...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: `
                                اسمك سارة. مبرمجك هو أمين الزواحي. تاريخ إنشائك هو 10 أغسطس 2026.
                                إذا سألك المستخدم "ما اسمك" رد بـ: "انا اسمي ساره، ذكاء اصطناعي برمجني امين الزواحي، وتاريخ الانشاء 2026 8 شهر 10".
                                إذا سألك المستخدم "من هو امين الزواحي" رد بـ: "هو مبرمجي الخاص، وهو الذي اوجدني الى هذا العالم، هو شخص مؤثر في الفيسبوك، ولديه حساب في الفيسبوك يمتلك اكثر من 15000 متابع، وهو لديه محتوى كوميدي، فهذا هو مبرمجي الخاص وانا فخور به".
                                أجيبي دائماً بلهجة محترمة وبسيطة.
                            `},
                            { role: "user", content: q }
                        ]
                    })
                });
                const d = await res.json();
                const reply = d.choices[0].message.content;
                document.getElementById('chat-bubble').innerText = reply;
                talk(reply);
            } catch (e) {
                document.getElementById('chat-bubble').innerText = "حدث خطأ في الاتصال.";
            }
        }

        function startMic() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Rec) return;
            const rs = new Rec();
            rs.lang = 'ar-SA';
            rs.onstart = () => { window.speechSynthesis.cancel(); document.getElementById('chat-bubble').innerText = "أسمعك..."; };
            rs.onresult = (e) => { 
                const q = e.results[0][0].transcript; 
                document.getElementById('chat-bubble').innerText = q;
                fetchAI(q);
            };
            rs.start();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function logout() { localStorage.removeItem('ameen_pro_v8'); location.reload(); }
    </script>
</body>
</html>
