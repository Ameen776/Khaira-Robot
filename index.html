<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختبر المطور أمين الزواحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #02050a; --panel: rgba(0, 15, 30, 0.95); --text: white; }
        .light-mode { --bg: #f0f2f5; --panel: rgba(255, 255, 255, 0.95); --text: #111; --neon: #0077ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; }

        /* الهيدر العلوي */
        header { position: fixed; top: 0; left: 0; right: 0; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 2000; display: none; }
        .hamburger { font-size: 2rem; color: var(--neon); cursor: pointer; }
        .profile-box { display: flex; align-items: center; gap: 10px; background: rgba(0,255,204,0.1); padding: 5px 12px; border-radius: 50px; border: 1.5px solid var(--neon); cursor: pointer; }
        .profile-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--neon); }

        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; z-index: 3000; background: #000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 25px; border: 2px solid var(--neon); text-align: center; width: 85%; max-width: 400px; }
        .login-btn { width: 100%; padding: 12px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* الواجهة الرئيسية */
        main { height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .robot-circle { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--neon); box-shadow: 0 0 30px var(--neon); overflow: hidden; cursor: pointer; }
        .speaking { animation: pulse 0.5s infinite alternate; border-color: #fff; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        
        #chat-bubble { width: 90%; max-width: 450px; background: var(--panel); padding: 20px; border-radius: 20px; border: 1px solid var(--neon); text-align: center; min-height: 80px; font-size: 1.1rem; }
        .id-text { color: var(--neon); font-size: 0.8rem; margin-top: 5px; }
        
        .sidebar { position: fixed; top: 0; left: -300px; width: 260px; height: 100%; background: var(--panel); border-right: 2px solid var(--neon); z-index: 2500; padding: 80px 20px; transition: 0.4s; }
        .sidebar.active { left: 0; }
        footer { position: fixed; bottom: 20px; font-size: 0.8rem; color: var(--neon); text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--neon);">مختبر أمين الزواحي</h2>
            <input type="text" id="u-name" placeholder="أدخل اسمك.." style="width:100%; padding:12px; margin-top:10px; border-radius:8px; text-align:center;">
            <button class="login-btn" onclick="saveUser()">دخول</button>
        </div>
    </div>

    <header id="h-node">
        <div class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('active')">☰</div>
        <div class="profile-box" onclick="location.reload()">
            <span id="p-name">أمين</span>
            <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="profile-img">
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <button class="login-btn" onclick="logout()">تسجيل الخروج</button>
    </div>

    <main id="m-node">
        <div class="robot-circle" id="r-node" onclick="startRecognition()">
            <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div id="chat-bubble">اضغط على الصورة لنتحدث..</div>
        <div class="id-text" id="id-node">ID: 000000000</div>
        <footer>المطور: أمين هارون الزواحي - اليمن 🇾🇪</footer>
    </main>

    <script>
        // مفتاح API الجديد (تأكد من فعاليته)
        const KEY = "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";
        let userData = { name: "", id: "" };

        window.onload = () => {
            const data = localStorage.getItem('ameen_ai_final');
            if(data) { userData = JSON.parse(data); showApp(); }
        };

        function saveUser() {
            const n = document.getElementById('u-name').value;
            if(!n) return;
            userData = { name: n, id: Math.floor(100000000 + Math.random() * 900000000) };
            localStorage.setItem('ameen_ai_final', JSON.stringify(userData));
            showApp();
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('m-node').style.display = 'flex';
            document.getElementById('h-node').style.display = 'flex';
            document.getElementById('p-name').innerText = userData.name;
            document.getElementById('id-node').innerText = "ID: " + userData.id;
            speak("أهلاً بك يا " + userData.name);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.rate = 1.0;
            msg.onstart = () => document.getElementById('r-node').classList.add('speaking');
            msg.onend = () => document.getElementById('r-node').classList.remove('speaking');
            window.speechSynthesis.speak(msg);
        }

        async function callAI(text) {
            document.getElementById('chat-bubble').innerText = "جاري معالجة طلبك...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: `أنتِ سارة، ذكاء اصطناعي مطور من أمين الزواحي. المستخدم هو ${userData.name}.` },
                            { role: "user", content: text }
                        ],
                        temperature: 0.7
                    })
                });

                if (!response.ok) throw new Error();

                const data = await response.json();
                const reply = data.choices[0].message.content;
                document.getElementById('chat-bubble').innerText = reply;
                speak(reply); // نطق الرد فوراً

            } catch (err) {
                const errorMsg = "المعذرة، واجهت مشكلة في الاتصال بالشبكة. حاول مرة أخرى.";
                document.getElementById('chat-bubble').innerText = errorMsg;
                speak(errorMsg);
            }
        }

        function startRecognition() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Rec) return alert("متصفحك لا يدعم التعرف على الصوت");
            
            const recognizer = new Rec();
            recognizer.lang = 'ar-SA';
            recognizer.onstart = () => { 
                document.getElementById('chat-bubble').innerText = "أنا أسمعك الآن..."; 
                window.speechSynthesis.cancel();
            };
            recognizer.onresult = (e) => {
                const query = e.results[0][0].transcript;
                document.getElementById('chat-bubble').innerText = "أنت: " + query;
                callAI(query);
            };
            recognizer.start();
        }

        function logout() { localStorage.removeItem('ameen_ai_final'); location.reload(); }
    </script>
</body>
</html>
