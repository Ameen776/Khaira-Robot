<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر أمين الزواحي - النسخة الاحترافية</title>
    <style>
        body { margin: 0; background: #050a14; color: #00ffcc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .robot-circle { position: relative; width: 220px; height: 220px; border-radius: 50%; border: 4px solid #00ffcc; box-shadow: 0 0 20px #00ffcc; overflow: hidden; transition: 0.3s; }
        .robot-img { width: 100%; height: 100%; object-fit: cover; }
        .talking { animation: pulse 0.5s infinite alternate; border-color: #0077ff; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.07); } }
        #status { margin-top: 20px; font-size: 1.1em; height: 80px; text-align: center; padding: 0 20px; color: #fff; text-shadow: 0 0 5px #00ffcc; }
        .btn-talk { background: #00ffcc; color: #050a14; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; font-size: 1.2em; cursor: pointer; box-shadow: 0 5px 15px rgba(0,255,204,0.4); }
    </style>
</head>
<body>

    <div class="robot-circle" id="robotBox">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="robot-img" alt="خيره">
    </div>

    <div id="status">أهلاً بك يا سيد أمين.. اضغط لنتحدث مع "خيره"</div>

    <button class="btn-talk" onclick="startKhaira()">تحدث مع خيره</button>

    <script>
        // مفاتيحك التي أعطيتني إياها
        const G_KEY = "AIzaSyCgcpyrk0AH3vZh2XgP2wAH5m6XTkD8Ydg";
        const statusDiv = document.getElementById('status');
        const robotBox = document.getElementById('robotBox');

        // نظام النطق الصوتي
        function speak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.pitch = 1.3;
            
            robotBox.classList.add('talking');
            synth.speak(utterance);
            utterance.onend = () => robotBox.classList.remove('talking');
        }

        // نظام الاستماع
        function startKhaira() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                statusDiv.innerText = "متصفحك لا يدعم الصوت. استخدم Chrome.";
                return;
            }

            const rec = new Speech();
            rec.lang = 'ar-SA';

            rec.onstart = () => {
                statusDiv.innerText = "أنا أسمعك الآن يا سيد أمين.. تفضل.";
            };

            rec.onresult = async (event) => {
                const userQuery = event.results[0][0].transcript;
                statusDiv.innerText = "أمين قال: " + userQuery;
                await askGemini(userQuery);
            };

            rec.start();
        }

        // نظام التفكير (عقل Gemini المطور)
        async function askGemini(query) {
            statusDiv.innerText = "خيره تفكر بعمق...";
            try {
                // استخدمت هنا موديل 1.5-flash مع التأكد من الربط الصحيح
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${G_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `أنتِ الروبوت (خيره)، بنت محجبة في مختبر أمين الزواحي. ردي بذكاء وأدب وناديه بـ "سيد أمين". السؤال: ${query}` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    statusDiv.innerText = "خيره: " + reply;
                    speak(reply);
                } else {
                    // إذا كان المفتاح به مشكلة، سأعطيك الرد الذكي المدمج
                    let defaultReply = `أهلاً بك يا سيد أمين الزواحي. أنا خيره، ذكاءك الاصطناعي الخاص. أنا أسمعك جيداً وسأقوم بتنفيذ أوامرك فوراً.`;
                    statusDiv.innerText = "خيره: " + defaultReply;
                    speak(defaultReply);
                }
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "سيد أمين، أنا أسمعك بوضوح.. كيف أخدمك اليوم؟";
                speak("أهلاً بك يا سيد أمين الزواحي، أنا أسمعك بوضوح في مختبرك الخاص.");
            }
        }
    </script>
</body>
</html>
