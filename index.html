<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>مختبر المطور أمين هارون الزواحي</title>
    <meta property="og:image" content="https://i.ibb.co/LX81sqyP/1775595508106c.png">
    <meta property="og:title" content="مختبر المطور أمين هارون الزواحي">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://code.responsivevoice.org/responsivevoice.js?key=YOUR_FREE_KEY"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #02050a; --panel: rgba(0, 15, 30, 0.95); --text: white; }
        .light-mode { --bg: #f0f2f5; --panel: rgba(255, 255, 255, 0.95); --text: #111; --neon: #0077ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        #login-screen { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 25px; border: 2px solid var(--neon); text-align: center; width: 85%; max-width: 400px; }
        input#user-name-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--neon); background: #000; color: white; text-align: center; margin-bottom: 15px; }
        .enter-btn { background: var(--neon); color: black; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; }

        .user-profile-header { position: fixed; top: 15px; right: 15px; z-index: 1600; display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 50px; border: 1px solid var(--neon); }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        #main-app { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: space-evenly; }
        .robot-frame { width: 250px; height: 250px; border-radius: 50%; border: 4px solid var(--neon); box-shadow: 0 0 20px var(--neon); overflow: hidden; cursor: pointer; }
        .robot-img { width: 100%; height: 100%; object-fit: cover; }
        
        #chat-display { width: 90%; max-width: 500px; text-align: center; background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid var(--neon); min-height: 80px; }
        .status-tag { color: var(--neon); font-size: 0.8rem; font-weight: bold; margin-top: 10px; }
        
        .speaking { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--neon); margin-bottom: 20px;">مختبر أمين الزواحي</h2>
            <input type="text" id="user-name-input" placeholder="اكتب اسمك هنا...">
            <button class="enter-btn" onclick="registerUser()">دخول النظام</button>
        </div>
    </div>

    <div class="user-profile-header" id="profile-header">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="user-avatar" id="profile-pic">
        <span id="profile-name" style="font-size: 0.8rem;"></span>
    </div>

    <div id="main-app">
        <div class="robot-frame" id="robot-frame" onclick="startListening()">
            <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" id="bot-pic" class="robot-img">
        </div>
        <div id="chat-display">حيا الله بيك..</div>
        <div class="status-tag" id="status-text">اضغط على الصورة للتحدث</div>
    </div>

    <script>
        const GROQ_API = "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";
        let currentUser = null;

        window.onload = function() {
            const saved = localStorage.getItem('ameen_ai_session');
            if (saved) {
                currentUser = JSON.parse(saved);
                loadApp(true);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        };

        function registerUser() {
            const name = document.getElementById('user-name-input').value;
            if (!name) return alert("سجل اسمك يا بطل");
            currentUser = { name: name };
            localStorage.setItem('ameen_ai_session', JSON.stringify(currentUser));
            loadApp(false);
        }

        function loadApp(isAuto) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('profile-header').style.display = 'flex';
            document.getElementById('profile-name').innerText = currentUser.name;

            const welcome = `يا هلا والله فيك يا ${currentUser.name}، أنا سارة ذكاء اصطناعي من تطوير المبرمج أمين الزواحي. أبشر بسعدك، كيف أقدر أساعدك؟`;
            document.getElementById('chat-display').innerText = welcome;
            
            // التحدث فور الدخول لضمان تفعيل محرك الصوت
            speakNow(welcome);
        }

        function speakNow(text) {
            document.getElementById('robot-frame').classList.add('speaking');
            
            // استخدام ResponsiveVoice لضمان العمل على الآيباد وجميع الأجهزة
            responsiveVoice.speak(text, "Arabic Female", {
                pitch: 1,
                rate: 1,
                onend: function() {
                    document.getElementById('robot-frame').classList.remove('speaking');
                }
            });
        }

        function startListening() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("جهازك لا يدعم المايك");
            
            const recognition = new Speech();
            recognition.lang = 'ar-SA';
            
            recognition.onstart = () => {
                responsiveVoice.cancel(); // إيقاف أي صوت شغال قبل الاستماع
                document.getElementById('status-text').innerText = "الحالة: أسمعك الآن..";
            };

            recognition.onresult = async (e) => {
                const query = e.results[0][0].transcript;
                document.getElementById('chat-display').innerText = "أنت: " + query;
                await getAI(query);
            };
            
            recognition.start();
        }

        async function getAI(q) {
            document.getElementById('status-text').innerText = "جاري التفكير...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ 
                            role: "system", 
                            content: `أنتِ سارة، ذكاء اصطناعي مطور من قبل أمين هارون الزواحي. المستخدم هو ${currentUser.name}. تحدثي بلهجة سعودية خليجية واضحة.` 
                        }, { role: "user", content: q }]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                document.getElementById('chat-display').innerText = reply;
                speakNow(reply);
                document.getElementById('status-text').innerText = "جاهزة لسماعك";
            } catch (e) { 
                document.getElementById('status-text').innerText = "خطأ في الشبكة"; 
            }
        }
    </script>
</body>
</html>
