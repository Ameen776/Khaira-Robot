<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔧 تحت الصيانة الشاملة | المطور أمين الزواحي 🔧</title>
    <meta name="description" content="الروبوت تحت الصيانة الإجبارية بواسطة المطور اليمني أمين الزواحي - تم فصل جميع الجلسات">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --neon: #ffcc00;
            --bg-dark: #0a0f1c;
            --panel: rgba(10, 20, 30, 0.96);
            --text: white;
            --warning-bg: rgba(255, 200, 0, 0.2);
            --warning-border: #ffcc00;
        }

        body {
            background: linear-gradient(135deg, #0a0f1c 0%, #0a1a2a 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة مع تأثير صيانة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,204,0,0.1) 0%, transparent 70%);
            pointer-events: none;
            animation: pulseBg 3s infinite alternate;
        }

        @keyframes pulseBg {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.9; transform: scale(1.05); }
        }

        /* شاشة الصيانة الإجبارية */
        #maintenance-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: url('https://img.freepik.com/free-photo/humanoid-robot-working-with-digital-interface_23-2149182351.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: brightness(0.6) blur(2px);
        }

        .maintenance-box {
            background: var(--panel);
            padding: 35px 25px;
            border-radius: 45px;
            border: 3px solid var(--warning-border);
            box-shadow: 0 0 70px rgba(255, 204, 0, 0.5), inset 0 0 20px rgba(255,204,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 480px;
            backdrop-filter: blur(15px);
            animation: floatIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-origin: center;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: scale(0.85) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* رسالة الصيانة المركزية */
        .maintenance-alert {
            background: var(--warning-bg);
            border: 2px solid var(--warning-border);
            border-radius: 35px;
            padding: 30px 20px;
            margin: 20px 0;
            position: relative;
            backdrop-filter: blur(5px);
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 rgba(255,204,0,0.3); border-color: #ffcc00; }
            70% { box-shadow: 0 0 0 15px rgba(255,204,0,0); border-color: #ffaa00; }
            100% { box-shadow: 0 0 0 0 rgba(255,204,0,0); border-color: #ffcc00; }
        }

        .warning-triangle {
            position: relative;
            width: 85px;
            height: 85px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: shakeWarning 0.6s ease-in-out, pulseWarning 1.8s infinite;
        }

        @keyframes shakeWarning {
            0%,100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-6px) rotate(-2deg); }
            75% { transform: translateX(6px) rotate(2deg); }
        }

        @keyframes pulseWarning {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255,204,0,0.7)); }
            70% { transform: scale(1.07); filter: drop-shadow(0 0 15px rgba(255,204,0,0.9)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255,204,0,0)); }
        }

        .warning-triangle::after {
            content: "!";
            font-size: 52px;
            font-weight: 900;
            color: #1e1e2f;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: monospace;
            text-shadow: 0 0 3px rgba(0,0,0,0.3);
        }

        .maintenance-title {
            font-size: 2rem;
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 8px rgba(255,204,0,0.6);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .maintenance-text {
            font-size: 1.15rem;
            color: #fff;
            background: rgba(0,0,0,0.55);
            padding: 15px;
            border-radius: 60px;
            margin: 15px 0;
            line-height: 1.6;
        }

        .dev-name {
            color: #ffcc00;
            font-weight: 900;
            font-size: 1.3rem;
            background: linear-gradient(45deg, #ffcc00, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(255,204,0,0.5);
            display: inline-block;
            animation: textGlow 1.2s infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 2px #ffcc00; }
            to { text-shadow: 0 0 12px #ffcc00; }
        }

        .retry-note {
            font-size: 0.95rem;
            color: #ffdd88;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 50px;
        }

        .retry-note i {
            font-style: normal;
            animation: blinkMove 1.2s infinite;
            display: inline-block;
        }

        @keyframes blinkMove {
            0%,100% { opacity: 1; transform: translateY(0); }
            50% { opacity: 0.5; transform: translateY(-3px); }
        }

        /* حقل إدخال معطل مؤقتاً */
        .disabled-input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 2px solid #ffcc00;
            background: rgba(0, 0, 0, 0.5);
            color: #aaa;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 20px;
            cursor: not-allowed;
            font-family: 'Cairo', sans-serif;
        }

        .maintenance-btn {
            background: linear-gradient(90deg, #ffcc00, #ffaa00);
            color: #1e1e2f;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: 900;
            cursor: not-allowed;
            width: 100%;
            font-size: 1.2rem;
            opacity: 0.7;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.75rem;
            opacity: 0.8;
            color: #ffcc00;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .gear-icon {
            display: inline-block;
            animation: spin 2.5s linear infinite;
            font-size: 1.3rem;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* شريط تقدم وهمي */
        .progress-bar-container {
            width: 80%;
            margin: 20px auto 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 6px;
            background: #ffcc00;
            border-radius: 30px;
            animation: loadingProgress 4s infinite alternate;
        }

        @keyframes loadingProgress {
            0% { width: 5%; }
            100% { width: 95%; }
        }

        /* تأثير حجب كامل */
        .session-clear-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffcc00;
            color: #111;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 10001;
            font-size: 0.8rem;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>

    <!-- شاشة الصيانة الإجبارية - تظهر لأي شخص حتى لو كان مسجل دخول -->
    <div id="maintenance-screen">
        <div class="maintenance-box">
            <h2 style="color: #ffcc00; margin-bottom: 5px; font-weight: 900;">🤖 نظام الروبوت الذكي</h2>
            <p style="color: #ddd; margin-bottom: 10px; font-size: 0.85rem;">المطور اليمني المعتمد | أمين الزواحي</p>
            
            <div class="maintenance-alert">
                <div class="warning-triangle"></div>
                <div class="maintenance-title">⚠️ صيانة إجبارية ⚠️</div>
                <div class="maintenance-text">
                    <span class="gear-icon">⚙️</span> 
                    <strong class="dev-name">أمين الزواحي</strong> 
                    <span class="gear-icon">⚙️</span><br>
                    يقوم بصيانة وتحديث الروبوت بشكل كامل<br>
                    <span style="font-size: 1rem; font-weight: bold;">🔧 تم فصل جميع الجلسات النشطة 🔧</span><br>
                    <span style="font-size: 0.85rem;">يرجى المعاودة لاحقاً بعد الانتهاء من الصيانة</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-fill"></div>
                </div>
                <div class="retry-note">
                    <span>🔄</span> <i>جاري تحديث الأنظمة</i> <span>🔄</span>
                </div>
            </div>
            
            <!-- حقل اسم معطل -->
            <input type="text" class="disabled-input" value="الخدمة غير متاحة حالياً" disabled>
            <button class="maintenance-btn" disabled>🚧 تحت الصيانة 🚧</button>
            
            <div class="footer-note">
                <span>🇾🇪 المطور: أمين الزواحي - اليمن 🇾🇪</span>
                <span>🔒 تم تطهير جميع الجلسات بنجاح</span>
            </div>
        </div>
    </div>

    <script>
        (function forceMaintenanceAndClearSessions() {
            // 1. مسح جميع بيانات الجلسات والتخزين المحلي لأي مستخدم مهما كان
            //    هذا يضمن فصل أي جلسة سابقة حتى لو كان المستخدم مسجل دخول من قبل
            try {
                // مسح localStorage بالكامل (أي جلسات أو بيانات حفظ)
                localStorage.clear();
                // مسح sessionStorage
                sessionStorage.clear();
                // مسح أي cookies قد تحتوي على بيانات جلسة
                document.cookie.split(";").forEach(function(c) { 
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                });
                // محاولة مسح indexedDB إذا وجد (للتأكد)
                if (window.indexedDB && window.indexedDB.databases) {
                    window.indexedDB.databases().then((dbs) => {
                        dbs.forEach(db => {
                            if (db.name) window.indexedDB.deleteDatabase(db.name);
                        });
                    }).catch(() => {});
                }
                console.log("✅ تم مسح جميع الجلسات والتخزين المحلي - وضع الصيانة الإجبارية مفعل");
            } catch(e) { console.warn(e); }
            
            // 2. منع أي محاولة لاستعادة الجلسة أو الرجوع للخلف
            history.pushState(null, null, location.href);
            window.onpopstate = function () {
                history.go(1);
            };
            
            // 3. التأكد من عدم وجود أي عناصر للتطبيق الأصلي في الـ DOM نهائياً
            //    حتى لو تم إضافة أي شيء لاحقاً سيتم إزالته
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    mutation.addedNodes.forEach(function(node) {
                        if (node.nodeType === 1) { // element node
                            if (node.id === 'main-app' || node.id === 'login-screen' || 
                                (node.classList && (node.classList.contains('user-profile-header') || node.classList.contains('hamburger')))) {
                                node.remove();
                            }
                        }
                    });
                });
            });
            observer.observe(document.body, { childList: true, subtree: true });
            
            // 4. إخفاء أي عناصر ضالة من التطبيق القديم
            const hideOldElements = setInterval(() => {
                const elementsToRemove = ['main-app', 'login-screen', 'profile-header', 'ham-icon', 'sidebar', 'profile-modal'];
                elementsToRemove.forEach(id => {
                    const el = document.getElementById(id);
                    if (el && el.id !== 'maintenance-screen') el.remove();
                });
                // إزالة أي عناصر إضافية
                document.querySelectorAll('.robot-frame, .chat-display, .user-profile-header, .hamburger').forEach(el => el.remove());
            }, 100);
            
            setTimeout(() => clearInterval(hideOldElements), 2000);
            
            // 5. منع الوصول لأي وظائف أو استدعاءات قد تحاول إعادة إنشاء التطبيق
            window.GROQ_API = undefined;
            delete window.GROQ_API;
            
            // 6. إضافة تأثير ظهور رسالة بأن الجلسة فُصلت
            function showSessionClearedMsg() {
                const toast = document.createElement('div');
                toast.className = 'session-clear-toast';
                toast.innerHTML = '🔧 تم فصل الجلسة السابقة - الروبوت تحت الصيانة الشاملة 🔧';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }
            setTimeout(showSessionClearedMsg, 500);
            
            // 7. منع أي محاولة لفتح التطبيق عبر console أو أي وسيلة أخرى
            Object.defineProperty(window, 'currentUser', {
                get: () => null,
                set: () => {}
            });
            Object.defineProperty(window, 'localStorage', {
                get: () => {
                    throw new Error("التخزين معطل بسبب وضع الصيانة");
                }
            });
            
            // 8. إضافة تأثيرات بصرية ديناميكية
            const triangle = document.querySelector('.warning-triangle');
            if (triangle) {
                setInterval(() => {
                    triangle.style.transform = 'scale(1.03) rotate(1deg)';
                    setTimeout(() => { if(triangle) triangle.style.transform = 'scale(1) rotate(0deg)'; }, 300);
                }, 1500);
            }
            
            // 9. توليد جزيئات ضوئية صفراء
            function createParticle() {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.width = '5px';
                particle.style.height = '5px';
                particle.style.backgroundColor = '#ffcc00';
                particle.style.borderRadius = '50%';
                particle.style.pointerEvents = 'none';
                particle.style.opacity = '0.7';
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = Math.random() * window.innerHeight + 'px';
                particle.style.animation = 'floatParticle 2.5s linear forwards';
                particle.style.zIndex = '10000';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 2500);
            }
            
            const styleParticle = document.createElement('style');
            styleParticle.textContent = `
                @keyframes floatParticle {
                    0% { transform: translateY(0) scale(1); opacity: 0.8; }
                    100% { transform: translateY(-60px) scale(0); opacity: 0; }
                }
            `;
            document.head.appendChild(styleParticle);
            setInterval(createParticle, 700);
            
            // 10. تغيير عنوان الصفحة وديناميكية
            document.title = "🔧 تحت الصيانة الإجبارية | أمين الزواحي 🔧";
            
            // 11. منع أي محاولة لتشغيل التطبيق الأصلي عن طريق إعادة كتابة window.onload
            const originalOnload = window.onload;
            window.onload = function(e) {
                if (originalOnload) originalOnload(e);
                // التأكد من بقاء شاشة الصيانة فقط
                const maint = document.getElementById('maintenance-screen');
                if (maint) maint.style.display = 'flex';
                // إزالة أي شيء آخر
                document.body.querySelectorAll('#main-app, #login-screen, .user-profile-header, .hamburger').forEach(el => el && el.remove());
            };
            
            // 12. حماية إضافية: إعادة تعيين أي sessionStorage أو localStorage يتم إضافته لاحقاً
            setInterval(() => {
                try {
                    if (localStorage.length > 0) localStorage.clear();
                    if (sessionStorage.length > 0) sessionStorage.clear();
                } catch(e) {}
            }, 500);
            
            // 13. تعطيل أي محاولة لاستدعاء وظائف التسجيل أو الدخول
            window.registerUser = function() {
                showSessionClearedMsg();
                alert("الروبوت تحت الصيانة الشاملة بواسطة المطور أمين الزواحي، يرجى المعاودة لاحقاً.");
                return false;
            };
            window.loadApp = function() { return false; };
            window.startListening = function() { return false; };
            window.handleRobotClick = function() { return false; };
            window.toggleMenu = function() { return false; };
            window.logoutUser = function() { return false; };
            window.openProfileModal = function() { return false; };
            
            // 14. إضافة تأثير كتابي لاسم المطور
            const devSpan = document.querySelector('.dev-name');
            if (devSpan) {
                let step = 0;
                setInterval(() => {
                    const colors = ['#ffcc00', '#ffdd44', '#ffaa33', '#ffcc00'];
                    devSpan.style.color = colors[step % colors.length];
                    step++;
                }, 400);
            }
            
            // 15. عرض رسالة إضافية بعد 2 ثانية
            setTimeout(() => {
                const note = document.createElement('div');
                note.style.position = 'fixed';
                note.style.bottom = '70px';
                note.style.left = '50%';
                note.style.transform = 'translateX(-50%)';
                note.style.backgroundColor = 'rgba(0,0,0,0.7)';
                note.style.color = '#ffcc00';
                note.style.padding = '6px 15px';
                note.style.borderRadius = '30px';
                note.style.fontSize = '0.7rem';
                note.style.zIndex = '10001';
                note.style.border = '1px solid #ffcc00';
                note.innerHTML = '⚡ تم تطهير جميع الجلسات السابقة بنجاح ⚡';
                document.body.appendChild(note);
                setTimeout(() => note.remove(), 4000);
            }, 1500);
            
            // منع أي محاولة للخروج من وضع الصيانة عبر back/forward
            history.pushState(null, null, location.href);
            window.addEventListener('popstate', function() {
                history.pushState(null, null, location.href);
                document.getElementById('maintenance-screen').style.display = 'flex';
            });
        })();
    </script>
</body>
</html>
