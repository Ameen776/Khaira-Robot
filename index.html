<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>مختبر المطور أمين هارون الزواحي</title>
    <meta name="description" content="نظام ذكاء اصطناعي متطور للمطور أمين هارون الزواحي">
    
    <meta property="og:title" content="مختبر المطور أمين هارون الزواحي">
    <meta property="og:description" content="تحدث مع الروبوت الذكي المبرمج بواسطة أمين الزواحي">
    <meta property="og:image" content="https://i.ibb.co/LX81sqyP/1775595508106c.png">
    <meta property="og:image:secure_url" content="https://i.ibb.co/LX81sqyP/1775595508106c.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="600">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i.ibb.co/LX81sqyP/1775595508106c.png">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #02050a; --panel: rgba(0, 15, 30, 0.95); --text: white; }
        .light-mode { --bg: #f0f2f5; --panel: rgba(255, 255, 255, 0.95); --text: #111; --neon: #0077ff; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; z-index: 2000; background: #000 url('https://img.freepik.com/free-photo/humanoid-robot-working-with-digital-interface_23-2149182351.jpg') center/cover; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 25px; border: 2px solid var(--neon); box-shadow: 0 0 30px var(--neon); text-align: center; width: 85%; max-width: 400px; }
        input#user-name-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--neon); background: rgba(0,0,0,0.6); color: white; text-align: center; font-size: 1.1rem; margin-bottom: 15px; outline: none; }
        .enter-btn { background: var(--neon); color: black; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }

        /* الملف الشخصي الدائري في الزاوية */
        .user-profile-header { 
            position: fixed; top: 15px; right: 15px; 
            z-index: 1600; display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.5); padding: 4px 10px 4px 5px; border-radius: 50px;
            border: 1px solid var(--neon); cursor: pointer;
        }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--neon); object-fit: cover; }
        .user-name-display { font-weight: bold; font-size: 0.8rem; color: var(--neon); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* الواجهة الرئيسية */
        #main-app { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: space-evenly; position: relative; }
        .grid { position: absolute; inset: 0; background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(600px) rotateX(60deg); bottom: -30%; opacity: 0.1; z-index: -1; }

        .robot-frame { width: 65vw; height: 65vw; max-width: 280px; max-height: 280px; border-radius: 50%; border: 4px solid var(--neon); box-shadow: 0 0 30px var(--neon); overflow: hidden; cursor: pointer; }
        .robot-img { width: 100%; height: 100%; object-fit: cover; }
        .speaking { animation: pulse 0.4s infinite alternate; border-color: #fff; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }

        .hamburger { position: fixed; top: 15px; left: 15px; z-index: 1600; cursor: pointer; font-size: 2rem; color: var(--neon); }
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: var(--panel); border-right: 2px solid var(--neon); z-index: 1550; padding: 70px 20px; transition: 0.4s; }
        .sidebar.active { left: 0; }
        
        #chat-display { width: 90%; max-width: 500px; text-align: center; font-size: 1.05rem; background: var(--panel); padding: 18px; border-radius: 18px; border: 1px solid var(--neon); min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .status-tag { color: var(--neon); font-size: 0.8rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--neon); margin-bottom: 20px;">مختبر أمين الزواحي</h2>
            <input type="text" id="user-name-input" placeholder="اكتب اسمك هنا...">
            <button class="enter-btn" onclick="registerUser()">تفعيل النظام الملكي</button>
        </div>
    </div>

    <div class="user-profile-header" id="profile-header" style="display: none;" onclick="document.getElementById('file-input').click()">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="user-avatar" id="profile-pic">
        <span class="user-name-display" id="profile-name">...</span>
        <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="uploadImage(event)">
    </div>

    <div class="hamburger" id="ham-icon" style="display: none;" onclick="toggleMenu()">☰</div>
    <div class="sidebar" id="sidebar">
        <button onclick="document.body.classList.toggle('light-mode')" style="width:100%; padding:10px; background:var(--neon); border:none; cursor:pointer; font-weight: bold;">🌗 وضع النهار/الليل</button>
        <button onclick="location.reload()" style="width:100%; padding:10px; background:#ff4444; color:white; border:none; cursor:pointer; font-weight: bold; margin-top:10px;">🚪 تسجيل الخروج</button>
    </div>

    <div id="main-app">
        <div class="grid"></div>
        <div class="robot-frame" id="robot-frame" onclick="handleRobotClick()">
            <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" id="bot-pic" class="robot-img">
        </div>
        <div id="chat-display">حيا الله بيك..</div>
        <div class="status-tag" id="status-text">اضغط على الصورة للتحدث</div>
    </div>

    <script>
        const GROQ_API = "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";
        let currentUser = null;
        let recognition;

        window.onload = function() {
            const saved = localStorage.getItem('ameen_ai_session');
            if (saved) {
                currentUser = JSON.parse(saved);
                loadApp(true);
            }
        };

        function registerUser() {
            const name = document.getElementById('user-name-input').value;
            if (!name) return alert("الرجاء كتابة اسمك");
            currentUser = { name: name, avatar: "https://i.ibb.co/FqbzKKDj/images-4.jpg" };
            localStorage.setItem('ameen_ai_session', JSON.stringify(currentUser));
            loadApp(false);
        }

        function loadApp(isAuto) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('profile-header').style.display = 'flex';
            document.getElementById('ham-icon').style.display = 'block';
            document.getElementById('profile-name').innerText = currentUser.name;
            document.getElementById('profile-pic').src = currentUser.avatar;

            const welcome = `حيا الله بيك يا ${currentUser.name}، أنا سارة ذكاء اصطناعي، طورني المبرمج القوي أمين الزواحي، أيش أخدمك به اليوم؟`;
            document.getElementById('chat-display').innerText = welcome;
            if(!isAuto) speakImmediate(welcome);
        }

        function speakImmediate(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            document.getElementById('robot-frame').classList.add('speaking');
            msg.onend = () => document.getElementById('robot-frame').classList.remove('speaking');
            window.speechSynthesis.speak(msg);
        }

        function uploadImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentUser.avatar = e.target.result;
                    localStorage.setItem('ameen_ai_session', JSON.stringify(currentUser));
                    document.getElementById('profile-pic').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function handleRobotClick() { window.speechSynthesis.cancel(); startListening(); }

        function startListening() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("المتصفح لا يدعم الصوت");
            recognition = new Speech();
            recognition.lang = 'ar-YE';
            recognition.onstart = () => { 
                document.getElementById('status-text').innerText = "الحالة: أسمعك.. اتكلم 🎙️";
                document.getElementById('robot-frame').classList.add('listening-glow');
            };
            recognition.onresult = async (e) => {
                const query = e.results[0][0].transcript;
                document.getElementById('chat-display').innerText = "أنت: " + query;
                document.getElementById('robot-frame').classList.remove('listening-glow');
                await getAI(query);
            };
            recognition.start();
        }

        async function getAI(q) {
            document.getElementById('status-text').innerText = "سارة تفكر...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ 
                            role: "system", 
                            content: `أنتِ سارة، ذكاء اصطناعي يمني. المستخدم هو ${currentUser.name}. مطورك هو أمين هارون الزواحي. تحدثي باللهجة اليمنية فقط.` 
                        }, { role: "user", content: q }]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                document.getElementById('chat-display').innerText = reply;
                speakImmediate(reply);
                document.getElementById('status-text').innerText = "اضغط للتحدث مرة أخرى";
            } catch (e) { document.getElementById('status-text').innerText = "خطأ في الشبكة"; }
        }
    </script>
</body>
</html>
