<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام المطور أمين هارون الزواحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #02050a; --panel: rgba(0, 15, 30, 0.95); --text: white; }
        .light-mode { --bg: #e0e0e0; --panel: rgba(255, 255, 255, 0.95); --text: #111; --neon: #0077ff; }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.4s; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; }

        /* --- واجهة الدخول (السيرفرات والبشر الرقميين) --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://img.freepik.com/free-photo/humanoid-robot-working-with-digital-interface_23-2149182351.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--panel); padding: 35px; border-radius: 20px;
            border: 2px solid var(--neon); box-shadow: 0 0 40px var(--neon);
            text-align: center; width: 90%; max-width: 450px;
        }
        .login-box h1 { font-size: 1.5rem; margin-bottom: 20px; color: var(--neon); }
        input#user-name {
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px;
            border: 1px solid var(--neon); background: rgba(0,0,0,0.5); color: white;
            text-align: center; font-size: 1.1rem;
        }
        .enter-btn {
            background: var(--neon); color: black; padding: 15px 40px;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%;
        }

        /* --- الواجهة الرئيسية للروبوت --- */
        #main-app { display: none; height: 100vh; width: 100vw; position: relative; flex-direction: column; align-items: center; justify-content: center; }
        
        /* الخلفية المتحركة */
        .grid { position: absolute; inset: 0; background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(600px) rotateX(60deg); bottom: -50%; opacity: 0.1; z-index: -1; animation: gridMove 15s linear infinite; }
        @keyframes gridMove { from { transform: perspective(600px) rotateX(60deg) translateY(0); } to { transform: perspective(600px) rotateX(60deg) translateY(50px); } }

        /* الروبوت المركزي */
        .robot-frame { 
            width: 65vw; height: 65vw; max-width: 350px; max-height: 350px; 
            border-radius: 50%; border: 6px solid var(--neon); 
            box-shadow: 0 0 60px var(--neon); overflow: hidden; 
        }
        .robot-img { width: 100%; height: 100%; object-fit: cover; }
        .speaking { animation: pulse 0.4s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }

        /* قائمة الهمبرجر */
        .hamburger { position: fixed; top: 20px; left: 20px; z-index: 100; cursor: pointer; font-size: 2rem; color: var(--neon); }
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--panel); border-right: 2px solid var(--neon);
            z-index: 99; padding: 60px 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar-item { margin-bottom: 25px; }
        .sidebar-item label { display: block; margin-bottom: 10px; font-weight: bold; }
        select, button.option { width: 100%; padding: 10px; border-radius: 8px; background: #000; color: white; border: 1px solid var(--neon); cursor: pointer; }

        #chat-display { width: 90%; max-width: 600px; margin-top: 30px; text-align: center; font-size: 1.2rem; background: var(--panel); padding: 15px; border-radius: 15px; border-left: 5px solid var(--neon); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>مختبر المطور أمين هارون الزواحي</h1>
            <p>أهلاً بك في نظام الذكاء الاصطناعي البشري</p>
            <input type="text" id="user-name" placeholder="ادخل اسمك الكريم هنا...">
            <button class="enter-btn" onclick="startSystem()">تفعيل الدخول للسيرفر</button>
        </div>
    </div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item">
            <label>👤 تغيير شخصية الروبوت:</label>
            <select onchange="updateCharacter(this.value)">
                <option value="https://i.ibb.co/FqbzKKDj/images-4.jpg">خيره الأساسية</option>
                <option value="https://img.freepik.com/free-photo/view-robot-working-as-delivery-person_23-2151061221.jpg">روبوت بشرية</option>
                <option value="https://img.freepik.com/free-photo/digital-art-style-female-robot-portrait_23-2151608249.jpg">الروبوت الذكي</option>
                <option value="https://img.freepik.com/free-photo/android-humanoid-robot-working-with-digital-interface_23-2149182339.jpg">المهندس الرقمي</option>
                <option value="https://img.freepik.com/free-photo/medium-shot-man-wearing-vr-glasses_23-2149126949.jpg">بشري متصل</option>
            </select>
        </div>
        <div class="sidebar-item">
            <label>🌐 لغة النظام:</label>
            <select onchange="setLanguage(this.value)">
                <option value="ar-SA">العربية</option>
                <option value="en-US">English</option>
            </select>
        </div>
        <div class="sidebar-item">
            <label>🌗 المظهر:</label>
            <button class="option" onclick="document.body.classList.toggle('light-mode')">ليلي / نهاري</button>
        </div>
    </div>

    <div id="main-app">
        <div class="grid"></div>
        <div class="robot-frame" id="robot-frame">
            <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" id="current-bot-img" class="robot-img">
        </div>
        <div id="chat-display">جاري الربط مع السيرفر الرئيسي...</div>
    </div>

    <script>
        const API_KEY = "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";
        let user = "";
        let lang = "ar-SA";

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function updateCharacter(url) { document.getElementById('current-bot-img').src = url; }
        function setLanguage(l) { lang = l; }

        // تفعيل الصوت للأيباد
        function enableAudio() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            context.resume();
        }

        function startSystem() {
            user = document.getElementById('user-name').value;
            if(!user) return alert("من فضلك اكتب اسمك يا باشا!");
            
            enableAudio();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';

            const welcomeMsg = `مرحباً بك يا سيد ${user}، معك ذكاء اصطناعي مبرمج من المطور أمين هارون الزواحي. أنا هنا لمساعدتك بجميع الأسئلة.`;
            document.getElementById('chat-display').innerText = welcomeMsg;
            speak(welcomeMsg, startListening);
        }

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang;
            document.getElementById('robot-frame').classList.add('speaking');
            msg.onend = () => {
                document.getElementById('robot-frame').classList.remove('speaking');
                if(callback) callback();
            };
            window.speechSynthesis.speak(msg);
        }

        function startListening() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new Speech();
            rec.lang = lang;
            rec.onstart = () => { document.getElementById('chat-display').innerText = "أسمعك الآن يا سيد " + user + "..."; };
            rec.onresult = async (e) => {
                const query = e.results[0][0].transcript;
                document.getElementById('chat-display').innerText = "أنت: " + query;
                await getAIResponse(query);
            };
            rec.onerror = () => { setTimeout(startListening, 500); };
            rec.start();
        }

        async function getAIResponse(q) {
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: `أنت المساعد الذكي الخاص بالمطور أمين هارون الزواحي. رد بذكاء على المستخدم ${user}.` },
                            { role: "user", content: q }
                        ]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                document.getElementById('chat-display').innerText = reply;
                speak(reply, startListening);
            } catch (e) { startListening(); }
        }
    </script>
</body>
</html>
