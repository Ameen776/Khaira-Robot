<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روبوت خيره - مختبر أمين الزواحي</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050a14; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .lab-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #0a1f3d, #050a14); z-index: -1; }
        .robot-frame { position: relative; width: 200px; height: 200px; border-radius: 50%; padding: 10px; background: linear-gradient(135deg, #00ffcc, #0077ff); box-shadow: 0 0 25px rgba(0,255,204,0.5); animation: glow 2s infinite alternate; }
        .robot-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; }
        #chat-box { width: 85%; max-width: 400px; height: 120px; background: rgba(0,0,0,0.6); border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid #00ffcc; overflow-y: auto; text-align: center; font-size: 1.1em; color: #e0fcfc; }
        .btn-talk { background: #00ffcc; color: #050a14; border: none; padding: 15px 35px; border-radius: 50px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,255,204,0.4); }
        .status-dot { width: 15px; height: 15px; background: red; border-radius: 50%; margin: 10px; box-shadow: 0 0 5px red; }
        .active { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        @keyframes glow { from { transform: scale(1); box-shadow: 0 0 20px #00ffcc; } to { transform: scale(1.05); box-shadow: 0 0 35px #0077ff; } }
    </style>
</head>
<body>

    <div class="lab-bg"></div>
    <div class="robot-frame" id="main-frame">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="robot-img" alt="خيره">
    </div>

    <div id="status" class="status-dot"></div>
    <div id="chat-box">أهلاً بك يا سيد أمين.. اضغط على الزر لنتحدث.</div>

    <button class="btn-talk" onclick="startKhaira()">تحدث معي يا أمين</button>

    <script>
        // مفاتيحك التي أرسلتها (تم دمجها بعناية)
        const GEMINI_KEY = "AIzaSyCgcpyrk0AH3vZh2XgP2wAH5m6XTkD8Ydg";
        
        const chatBox = document.getElementById('chat-box');
        const statusDot = document.getElementById('status');
        const frame = document.getElementById('main-frame');

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            utter.pitch = 1.2;
            frame.style.animation = "glow 0.4s infinite alternate";
            synth.speak(utter);
            utter.onend = () => frame.style.animation = "glow 2s infinite alternate";
        }

        function startKhaira() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-SA';
            
            recognition.onstart = () => {
                statusDot.classList.add('active');
                chatBox.innerText = "أنا أسمعك الآن يا باشا أمين...";
            };

            recognition.onresult = async (event) => {
                statusDot.classList.remove('active');
                const speech = event.results[0][0].transcript;
                chatBox.innerText = "أنت: " + speech;
                await askGemini(speech);
            };

            recognition.onerror = () => {
                statusDot.classList.remove('active');
                chatBox.innerText = "لم أسمعك جيداً.. حاول مرة أخرى.";
            };

            recognition.start();
        }

        async function askGemini(text) {
            chatBox.innerText = "خيره تفكر...";
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `أنت روبوت ذكي اسمك خيره، وتظهرين كبنت محجبة. تعملين في مختبر أمين الزواحي. ردي باختصار ولطف على: ${text}` }] }]
                    })
                });

                const data = await response.json();
                
                // كاشف الأخطاء المطور
                if (data.error) {
                    if (data.error.message.includes("API key not valid")) {
                        chatBox.innerText = "خطأ: مفتاح Gemini غير صالح. يرجى التأكد منه.";
                    } else {
                        chatBox.innerText = "مشكلة في العقل: " + data.error.message;
                    }
                    return;
                }

                if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    chatBox.innerText = "خيره: " + reply;
                    speak(reply);
                }

            } catch (err) {
                chatBox.innerText = "تأكد من الإنترنت يا سيد أمين.. لم أستطع الوصول لعقلي.";
            }
        }
    </script>
</body>
</html>
