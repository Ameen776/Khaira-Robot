<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر أمين الزواحي - النسخة النهائية</title>
    <style>
        body { margin: 0; background: #050a14; color: #00ffcc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .robot-frame { position: relative; width: 230px; height: 230px; border-radius: 50%; border: 4px solid #00ffcc; box-shadow: 0 0 25px #00ffcc; overflow: hidden; transition: 0.3s; }
        .robot-img { width: 100%; height: 100%; object-fit: cover; }
        .talking { animation: pulse 0.4s infinite alternate; border-color: #0077ff; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
        #status { margin-top: 20px; font-size: 1.1em; height: 80px; text-align: center; padding: 0 20px; color: #fff; }
        .btn-talk { background: #00ffcc; color: #050a14; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; font-size: 1.2em; cursor: pointer; box-shadow: 0 5px 15px rgba(0,255,204,0.4); }
    </style>
</head>
<body>

    <div class="robot-frame" id="box">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="robot-img" alt="خيره">
    </div>

    <div id="status">أهلاً بك يا سيد أمين.. اضغط للتحدث مع "خيره"</div>

    <button class="btn-talk" onclick="startRecognition()">تحدث مع خيره</button>

    <script>
        // مفاتيح أمين الزواحي
        const G_KEY = "AIzaSyCgcpyrk0AH3vZh2XgP2wAH5m6XTkD8Ydg";
        const GROQ_KEY = "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";

        const statusDiv = document.getElementById('status');
        const box = document.getElementById('box');

        // وظيفة النطق الصوتي
        function speak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.pitch = 1.3;
            
            box.classList.add('talking');
            synth.speak(utterance);
            utterance.onend = () => box.classList.remove('talking');
        }

        // وظيفة الاستماع
        function startRecognition() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                statusDiv.innerText = "متصفحك لا يدعم الصوت. استخدم Chrome.";
                return;
            }

            const rec = new Speech();
            rec.lang = 'ar-SA';

            rec.onstart = () => {
                statusDiv.innerText = "أنا أسمعك الآن يا سيد أمين.. تفضل بالحديث.";
            };

            rec.onresult = async (event) => {
                const query = event.results[0][0].transcript;
                statusDiv.innerText = "أمين قال: " + query;
                
                // إرسال السؤال للعقل الحقيقي (Gemini)
                await getAIResponse(query);
            };

            rec.start();
        }

        // وظيفة جلب الرد الذكي
        async function getAIResponse(userInput) {
            statusDiv.innerText = "خيره تفكر في الإجابة...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${G_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `أنتِ الروبوت (خيره)، بنت محجبة تعملين في مختبر التكنولوجيا الخاص بـ "أمين الزواحي". ردي بذكاء وأدب وناديه بـ "سيد أمين". السؤال: ${userInput}` }] }]
                    })
                });

                const data = await response.json();
                
                // التحقق من وصول الرد بنجاح
                if (data.candidates && data.candidates[0].content) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    statusDiv.innerText = "خيره: " + aiReply;
                    speak(aiReply);
                } else {
                    throw new Error("فشل Gemini");
                }
            } catch (err) {
                // إذا فشل Gemini، نستخدم عقل Groq السريع
                try {
                    const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${GROQ_KEY}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: "llama3-8b-8192",
                            messages: [{ role: "user", content: `أنتِ الروبوت خيره، ردي بذكاء على سيد أمين. السؤال: ${userInput}` }]
                        })
                    });
                    const groqData = await groqRes.json();
                    const groqReply = groqData.choices[0].message.content;
                    statusDiv.innerText = "خيره (Groq): " + groqReply;
                    speak(groqReply);
                } catch (e) {
                    statusDiv.innerText = "سيد أمين، أنا أسمعك لكن عقلي يحتاج لإعادة اتصال بالإنترنت.";
                    speak("أهلاً بك يا سيد أمين الزواحي، أنا أسمعك بوضوح ولكن يبدو أن هناك ضغطاً على خوادم الذكاء الاصطناعي الآن.");
                }
            }
        }
    </script>
</body>
</html>
