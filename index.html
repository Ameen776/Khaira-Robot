<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختبر المطور أمين الزواحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #02050a; --panel: rgba(0, 15, 30, 0.95); --text: white; }
        .light-mode { --bg: #f0f2f5; --panel: rgba(255, 255, 255, 0.95); --text: #111; --neon: #0077ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; height: 100vh; overflow: hidden; transition: 0.3s; }

        /* الهيدر العلوي */
        header { position: fixed; top: 0; left: 0; right: 0; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 2000; display: none; }
        .hamburger { font-size: 2.2rem; color: var(--neon); cursor: pointer; }
        .profile-btn { display: flex; align-items: center; gap: 10px; background: rgba(0,255,204,0.1); padding: 5px 15px; border-radius: 50px; border: 1.5px solid var(--neon); cursor: pointer; }
        .profile-btn img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--neon); }

        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; z-index: 3000; background: #000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 25px; border: 2px solid var(--neon); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 0 20px var(--neon); }
        .main-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--neon); background: #000; color: #fff; text-align: center; margin-bottom: 15px; font-weight: bold; }

        /* القوائم */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--panel); border-right: 2px solid var(--neon); z-index: 2500; padding: 80px 20px; transition: 0.4s; }
        .sidebar.active { left: 0; }
        .side-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: var(--neon); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* معرض الشخصيات */
        #char-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .char-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .char-item { width: 120px; height: 120px; border-radius: 20px; border: 3px solid var(--neon); overflow: hidden; cursor: pointer; }
        .char-item img { width: 100%; height: 100%; object-fit: cover; }

        /* الواجهة الرئيسية */
        main { height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .robot-node { width: 240px; height: 240px; border-radius: 50%; border: 5px solid var(--neon); box-shadow: 0 0 40px var(--neon); overflow: hidden; cursor: pointer; transition: 0.3s; }
        .speaking { animation: pulse 0.4s infinite alternate; border-color: gold; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
        
        #chat-bubble { width: 90%; max-width: 500px; background: var(--panel); padding: 25px; border-radius: 25px; border: 1px solid var(--neon); text-align: center; font-size: 1.2rem; min-height: 100px; line-height: 1.6; }
        .id-badge { color: var(--neon); font-size: 0.8rem; font-family: monospace; letter-spacing: 2px; text-shadow: 0 0 5px var(--neon); }
        footer { position: fixed; bottom: 20px; font-size: 0.9rem; color: var(--neon); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--neon); margin-bottom: 20px;">مختبر أمين الزواحي</h2>
            <input type="text" id="name-field" class="main-input" placeholder="سجل اسمك يا بطل..">
            <button class="side-btn" onclick="saveUser()">دخول النظام</button>
        </div>
    </div>

    <header id="app-header">
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
        <div class="profile-btn" onclick="openChars()">
            <span id="nav-name" style="font-weight: bold;">أمين</span>
            <img id="nav-avatar" src="https://i.ibb.co/FqbzKKDj/images-4.jpg">
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <button class="side-btn" onclick="updateLang('ar')">اللغة العربية</button>
        <button class="side-btn" onclick="updateLang('en')">English</button>
        <button class="side-btn" onclick="document.body.classList.toggle('light-mode')">وضع النهار/الليل</button>
        <button class="side-btn" style="background:#ff4444; color:#fff;" onclick="logout()">تسجيل الخروج</button>
    </div>

    <div id="char-modal">
        <h2 style="color:var(--neon)">اختر شخصية الروبوت</h2>
        <div class="char-grid">
            <div class="char-item" onclick="setBot('https://i.ibb.co/FqbzKKDj/images-4.jpg')"><img src="https://i.ibb.co/FqbzKKDj/images-4.jpg"></div>
            <div class="char-item" onclick="setBot('https://img.freepik.com/free-photo/digital-art-style-female-robot-portrait_23-2151608249.jpg')"><img src="https://img.freepik.com/free-photo/digital-art-style-female-robot-portrait_23-2151608249.jpg"></div>
        </div>
        <button class="side-btn" style="width:150px; margin-top:30px;" onclick="closeChars()">رجوع</button>
    </div>

    <main id="app-content">
        <div class="robot-node" id="r-node" onclick="startMic()">
            <img id="main-bot-img" src="https://i.ibb.co/FqbzKKDj/images-4.jpg" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div id="chat-bubble">أهلاً بك.. اضغط على الروبوت لنتحدث</div>
        <div class="id-badge" id="id-display">ID: 000000000</div>
        <footer>المطور: أمين هارون الزواحي - اليمن 🇾🇪</footer>
    </main>

    <script>
        // مفتاحك الجديد يا أمين - تم تفعيله بنجاح
        const API_KEY = "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";
        let state = { name: "", id: "", bot: "https://i.ibb.co/FqbzKKDj/images-4.jpg", lang: "ar" };

        window.onload = () => {
            const data = localStorage.getItem('ameen_pro_v7');
            if(data) { state = JSON.parse(data); run(); }
        };

        function saveUser() {
            const n = document.getElementById('name-field').value;
            if(!n) return alert("أدخل اسمك أولاً");
            state.name = n;
            state.id = Math.floor(100000000 + Math.random() * 900000000);
            localStorage.setItem('ameen_pro_v7', JSON.stringify(state));
            run();
        }

        function run() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('nav-name').innerText = state.name;
            document.getElementById('id-display').innerText = "ID: " + state.id;
            document.getElementById('main-bot-img').src = state.bot;
            document.getElementById('nav-avatar').src = state.bot;
            
            talk(state.lang === 'ar' ? `حياك الله يا ${state.name}، أنا سارة جاهزة لسماعك.` : `Welcome ${state.name}, I am Sara, ready to listen.`);
        }

        function talk(t) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(t);
            speech.lang = state.lang === 'ar' ? 'ar-SA' : 'en-US';
            speech.rate = 1.1;
            speech.onstart = () => document.getElementById('r-node').classList.add('speaking');
            speech.onend = () => document.getElementById('r-node').classList.remove('speaking');
            window.speechSynthesis.speak(speech);
        }

        async function fetchAI(q) {
            document.getElementById('chat-bubble').innerText = "...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: `You are an AI by Ameen Al-Zawahi. User: ${state.name}. Language: ${state.lang}. Answer briefly.` }, { role: "user", content: q }]
                    })
                });
                const d = await res.json();
                const reply = d.choices[0].message.content;
                document.getElementById('chat-bubble').innerText = reply;
                talk(reply);
            } catch (e) {
                document.getElementById('chat-bubble').innerText = "حدث خطأ بسيط، حاول مرة أخرى";
            }
        }

        function startMic() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Rec) return;
            const rs = new Rec();
            rs.lang = state.lang === 'ar' ? 'ar-SA' : 'en-US';
            rs.onstart = () => { window.speechSynthesis.cancel(); document.getElementById('chat-bubble').innerText = "أسمعك الآن.."; };
            rs.onresult = (e) => { 
                const q = e.results[0][0].transcript; 
                document.getElementById('chat-bubble').innerText = q;
                fetchAI(q);
            };
            rs.start();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openChars() { document.getElementById('char-modal').style.display = 'flex'; }
        function closeChars() { document.getElementById('char-modal').style.display = 'none'; }
        
        function setBot(url) { 
            state.bot = url; 
            localStorage.setItem('ameen_pro_v7', JSON.stringify(state)); 
            location.reload(); 
        }
        
        function updateLang(l) { 
            state.lang = l; 
            localStorage.setItem('ameen_pro_v7', JSON.stringify(state)); 
            location.reload(); 
        }
        
        function logout() { localStorage.removeItem('ameen_pro_v7'); location.reload(); }
    </script>
</body>
</html>
