<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر أمين الزواحي - خيره الذكية</title>
    <style>
        body { margin: 0; background: #050a14; color: #00ffcc; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .robot-frame { position: relative; width: 220px; height: 220px; border-radius: 50%; padding: 12px; background: linear-gradient(135deg, #00ffcc, #0077ff); box-shadow: 0 0 30px rgba(0,255,204,0.6); animation: pulse 2s infinite alternate; }
        .robot-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; }
        #chat-box { width: 90%; max-width: 450px; height: 130px; background: rgba(0,0,0,0.7); border-radius: 15px; padding: 15px; margin-top: 25px; border: 1px solid #00ffcc; text-align: center; font-size: 1.1em; color: #fff; overflow-y: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-talk { background: #00ffcc; color: #050a14; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; font-size: 1.3em; cursor: pointer; margin-top: 25px; box-shadow: 0 5px 20px rgba(0,255,204,0.4); transition: 0.3s; }
        .btn-talk:hover { background: #00ddbb; transform: scale(1.05); }
        .status { margin-top: 10px; font-size: 0.8em; color: #555; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="robot-frame" id="frame">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="robot-img" alt="خيره">
    </div>

    <div id="chat-box">أهلاً بك يا سيد أمين الزواحي.. أنا جاهزة لسماعك الآن.</div>

    <button class="btn-talk" onclick="startRecognition()">تحدث مع خيره</button>
    <div class="status" id="conn-status">النظام متصل عبر بروتوكول آمن</div>

    <script>
        // مفاتيحك الأصلية (مدمجة وجاهزة)
        const GEMINI_API = "AIzaSyCgcpyrk0AH3vZh2XgP2wAH5m6XTkD8Ydg";
        let lastResponse = ""; // لمنع التكرار

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            utter.pitch = 1.1;
            
            // تحريك الوجه مع الصوت
            document.getElementById('frame').style.animation = "pulse 0.3s infinite alternate";
            synth.speak(utter);
            utter.onend = () => { document.getElementById('frame').style.animation = "pulse 2s infinite alternate"; };
        }

        function startRecognition() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-SA';
            
            recognition.onstart = () => {
                document.getElementById('chat-box').innerText = "أنا أسمعك يا سيد أمين.. تفضل بالتحدث.";
            };

            recognition.onresult = async (event) => {
                const userQuery = event.results[0][0].transcript;
                document.getElementById('chat-box').innerText = "أنت: " + userQuery;
                await processWithAI(userQuery);
            };

            recognition.onerror = () => {
                document.getElementById('chat-box').innerText = "عذراً يا سيد أمين، لم أسمعك جيداً.";
            };

            recognition.start();
        }

        async function processWithAI(query) {
            document.getElementById('chat-box').innerText = "خيره تحلل الكلام...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `أنت روبوت اسمك خيره، بنت محجبة في مختبر أمين الزواحي. أجيبي على هذا الكلام بذكاء وجديد وبدون تكرار للإجابات السابقة. ناديه بـ "سيد أمين". الكلام هو: ${query}` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    
                    // فحص التكرار
                    if (aiText === lastResponse) {
                        processWithAI(query); // إعادة المحاولة للحصول على رد مختلف
                        return;
                    }

                    lastResponse = aiText;
                    document.getElementById('chat-box').innerText = "خيره: " + aiText;
                    speak(aiText);
                } else if (data.error) {
                    document.getElementById('chat-box').innerText = "مشكلة فنية: " + data.error.message;
                }
            } catch (err) {
                document.getElementById('chat-box').innerText = "حدث خطأ في الاتصال بالخادم.";
            }
        }
    </script>
</body>
</html>
