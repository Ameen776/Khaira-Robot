<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر أمين الزواحي - العقل السريع</title>
    <style>
        body { margin: 0; background: #050a14; color: #00ffcc; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .robot-frame { position: relative; width: 220px; height: 220px; border-radius: 50%; padding: 12px; background: linear-gradient(135deg, #00ffcc, #0077ff); box-shadow: 0 0 35px rgba(0,255,204,0.7); animation: pulse 2s infinite alternate; }
        .robot-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; }
        #chat-box { width: 90%; max-width: 450px; height: 150px; background: rgba(0,0,0,0.85); border-radius: 20px; padding: 20px; margin-top: 25px; border: 1px solid #00ffcc; text-align: center; font-size: 1.2em; color: #fff; display: flex; align-items: center; justify-content: center; }
        .btn-talk { background: #00ffcc; color: #050a14; border: none; padding: 20px 50px; border-radius: 50px; font-weight: bold; font-size: 1.4em; cursor: pointer; margin-top: 30px; box-shadow: 0 5px 25px rgba(0,255,204,0.5); }
        .status-info { margin-top: 10px; font-size: 0.9em; color: #00ffcc; font-weight: bold; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="robot-frame" id="frame">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="robot-img" alt="خيره">
    </div>

    <div class="status-info" id="status">نظام Groq السريع متصل</div>
    <div id="chat-box">أهلاً بك يا سيد أمين.. أنا جاهزة الآن تماماً.</div>
    <button class="btn-talk" onclick="startRecognition()">تحدث مع خيره</button>

    <script>
        // مفتاح Groq الجديد الخاص بك
        const MY_KEY = "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"; 

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            document.getElementById('frame').style.animation = "pulse 0.4s infinite alternate";
            synth.speak(utter);
            utter.onend = () => { document.getElementById('frame').style.animation = "pulse 2s infinite alternate"; };
        }

        function startRecognition() {
            const recognition = new (window.webkitSpeechRecognition || window.Recognition)();
            recognition.lang = 'ar-SA';
            recognition.onstart = () => { document.getElementById('chat-box').innerText = "أسمعك يا سيد أمين..."; };
            recognition.onresult = async (event) => {
                const query = event.results[0][0].transcript;
                document.getElementById('chat-box').innerText = "أنت: " + query;
                await askAi(query);
            };
            recognition.start();
        }

        async function askAi(query) {
            document.getElementById('status').innerText = "خيره تحلل البيانات...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${MY_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: `أنت خيره، مساعدة ذكية لأمين الزواحي. ردي بذكاء وقصر: ${query}` }]
                    })
                });

                const data = await response.json();
                const aiReply = data.choices[0].message.content;
                document.getElementById('chat-box').innerText = aiReply;
                speak(aiReply);
            } catch (err) {
                document.getElementById('chat-box').innerText = "تأكد من حفظ الملف بشكل صحيح في GitHub.";
            }
        }
    </script>
</body>
</html>
