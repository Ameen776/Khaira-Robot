<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر أمين الزواحي - روبوت خيره الملكي</title>
    <style>
        body { margin: 0; background: #051020; color: #00ffcc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* تأثيرات المختبر الخلفية */
        .lab-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a1f3d 0%, #050a14 100%); z-index: -1; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 204, 0.1); top: 0; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        /* إطار خيره المطور */
        .robot-portal { position: relative; width: 240px; height: 240px; border-radius: 50%; padding: 8px; background: linear-gradient(45deg, #00ffcc, #0077ff); box-shadow: 0 0 40px rgba(0, 255, 204, 0.5); }
        .robot-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; }
        
        /* حركة النبض عند الكلام */
        .speaking { animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 20px #00ffcc; } to { transform: scale(1.08); box-shadow: 0 0 50px #0077ff; } }

        #status-display { margin-top: 25px; font-size: 1.1em; text-align: center; color: #e0ffff; text-shadow: 0 0 10px #00ffcc; min-height: 60px; padding: 0 20px; }
        
        .btn-action { background: linear-gradient(135deg, #00ffcc, #0088ff); color: #051020; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-top: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,255,204,0.4); }
    </style>
</head>
<body>
    <div class="lab-bg"><div class="scan-line"></div></div>

    <div class="robot-portal" id="mainFrame">
        <img src="https://i.ibb.co/FqbzKKDj/images-4.jpg" class="robot-img" alt="خيره">
    </div>

    <div id="status-display">مرحباً بك يا سيد أمين الزواحي.. أنا "خيره" بانتظار أمرك.</div>

    <button class="btn-action" onclick="startKhaira()">تحدث معي يا أمين</button>

    <script>
        // مفاتيح أمين الزواحي الرسمية
        const GEMINI_API = "AIzaSyCgcpyrk0AH3vZh2XgP2wAH5m6XTkD8Ydg";
        const GROQ_API = "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";

        const display = document.getElementById('status-display');
        const frame = document.getElementById('mainFrame');

        // نظام النطق المحسن
        function talk(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'ar-SA';
            speech.pitch = 1.3;
            speech.rate = 1.0;

            frame.classList.add('speaking');
            window.speechSynthesis.speak(speech);
            speech.onend = () => frame.classList.remove('speaking');
        }

        // نظام السمع الذكي (أذن الروبوت)
        function startKhaira() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) {
                display.innerText = "متصفحك لا يدعم السمع، استخدم Chrome.";
                return;
            }

            const rec = new Recognition();
            rec.lang = 'ar-SA';

            rec.onstart = () => {
                display.innerText = "أنا أسمعك الآن بوضوح يا سيد أمين...";
                frame.style.boxShadow = "0 0 50px #00ff00";
            };

            rec.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                display.innerText = "أمين: " + text;
                frame.style.boxShadow = "0 0 40px rgba(0, 255, 204, 0.5)";
                
                // استدعاء عقل Gemini المعدل
                await think(text);
            };

            rec.onerror = () => {
                display.innerText = "حدث خطأ في الميكروفون.. حاول مرة أخرى.";
                frame.style.boxShadow = "0 0 40px rgba(255, 0, 0, 0.5)";
            };

            rec.start();
        }

        // نظام التفكير (حل مشكلة Model Not Found)
        async function think(input) {
            display.innerText = "خيره تحلل الكلام...";
            try {
                // استخدمنا هنا الرابط المباشر للموديل v1beta لضمان التوافق
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `أنتِ الروبوت "خيره"، فتاة محجبة ذكية جداً في مختبر أمين الزواحي. ردي بأسلوب ملكي محترم وناديه دائماً بـ "سيد أمين". السؤال: ${input}` }] }]
                    })
                });

                const data = await response.json();
                
                // معالجة الرد والتأكد من وجود نص
                if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    display.innerText = "خيره: " + reply;
                    talk(reply);
                } else {
                    // إذا كان هناك خطأ في الموديل، نجرب البديل الاحتياطي فوراً
                    throw new Error("Retry with different model");
                }

            } catch (err) {
                display.innerText = "سيد أمين، أحتاج لتحديث بسيط في اتصالي.. جرب الآن.";
                talk("عذراً سيد أمين، عاود التحدث معي مرة أخرى.");
            }
        }
    </script>
</body>
</html>
